name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, Typecheck, Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TURBO_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Restore Turbo local cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('package-lock.json', 'turbo.json', 'tsconfig*.json', 'biome.json', 'src/**', 'scripts/**', '.github/workflows/**') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: npm ci

      - name: Run CI tasks
        run: npx turbo run lint typecheck build

      - name: Pack dry run
        run: npx turbo run pack:dry-run

